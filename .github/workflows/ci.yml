name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check main scripts
        run: |
          bash -n swarm.sh
          bash -n swarm_red.sh
          bash -n osint.sh
          bash -n pci_scan.sh
          bash -n setup.sh
          bash -n swarm_batch.sh
          bash -n swarm_full.sh

      - name: Check lib/ shell modules
        run: |
          for f in lib/*.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done

  unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests 2>/dev/null || true

      - name: Run tests
        run: python3 -m pytest test_lib.py -v --tb=short
