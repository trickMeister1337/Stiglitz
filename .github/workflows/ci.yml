name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check main scripts
        run: |
          bash -n stiglitz.sh
          bash -n stiglitz_red.sh
          bash -n osint.sh
          bash -n setup.sh
          bash -n stiglitz_batch.sh
          bash -n stiglitz_full.sh

      - name: Check lib/ shell modules
        run: |
          for f in lib/*.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done

      - name: Check Python modules (compile)
        run: |
          python3 -m py_compile stiglitz_report.py
          for f in lib/*.py; do
            echo "Compiling $f..."
            python3 -m py_compile "$f"
          done

  unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest test_lib.py test_swarm_modules.py -v --tb=short
