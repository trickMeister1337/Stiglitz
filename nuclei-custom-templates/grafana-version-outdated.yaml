id: grafana-version-outdated

info:
  name: Grafana Outdated Version (< 10.x)
  author: Stiglitz
  severity: high
  description: |
    Grafana version detected via /api/health (unauthenticated endpoint).
    Version is below 10.x and is affected by multiple known CVEs including
    CVE-2023-3128 (auth bypass Azure AD), CVE-2023-6152 (account takeover),
    CVE-2023-2183 (IDOR notifications), CVE-2023-1410 (stored XSS plugins).
    Upgrade to the latest stable Grafana 10.x or 11.x release.
  reference:
    - https://grafana.com/security/security-advisories/
    - https://nvd.nist.gov/vuln/search/results?query=grafana&results_type=overview&form_type=Basic&search_type=all&isCpeNameSearch=false
    - https://cve.mitre.org/cgi-bin/cvekey.cgi?keyword=grafana
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:L/A:N
    cvss-score: 8.2
    cwe-id: CWE-1104
    cpe: cpe:2.3:a:grafana:grafana:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 2
    vendor: grafana
    product: grafana
  tags: tech,grafana,version,outdated,exposure,stiglitz

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/health"
      - "{{BaseURL}}/login"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: regex
        part: body
        # Match versions 6.x, 7.x, 8.x, 9.x — all outdated as of 2025
        regex:
          - '"version":"[6-9]\.[0-9]'

      - type: word
        part: status
        words:
          - "200"

    extractors:
      - type: regex
        name: grafana_version
        part: body
        group: 1
        regex:
          - '"version":"([0-9]+\.[0-9]+\.[0-9]+[^"]*)"'
          - 'Grafana v([0-9]+\.[0-9]+\.[0-9]+)'
