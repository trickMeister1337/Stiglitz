# ═══════════════════════════════════════════════════════════════
#  Stiglitz RED v7.0 — Configuração de Perfis
# ═══════════════════════════════════════════════════════════════
#  Edite este arquivo para ajustar o comportamento de cada fase.
#  Formato: PROFILE_CAMPO[perfil]=valor
# ═══════════════════════════════════════════════════════════════

# ── Descrições ──────────────────────────────────────────────────
PROFILE_DESCRIPTION[lab]="Lab/Sandbox — sem restrições, ambiente descartável"
PROFILE_DESCRIPTION[staging]="Staging/Homolog — agressividade alta, dump habilitado"
PROFILE_DESCRIPTION[production]="Produção (janela aprovada) — mínimo impacto, só confirmação"

# ── sqlmap ──────────────────────────────────────────────────────
PROFILE_SQLMAP_LEVEL[lab]=5;    PROFILE_SQLMAP_LEVEL[staging]=3;    PROFILE_SQLMAP_LEVEL[production]=1
PROFILE_SQLMAP_RISK[lab]=3;     PROFILE_SQLMAP_RISK[staging]=2;     PROFILE_SQLMAP_RISK[production]=1
PROFILE_SQLMAP_THREADS[lab]=10; PROFILE_SQLMAP_THREADS[staging]=5;  PROFILE_SQLMAP_THREADS[production]=1
PROFILE_SQLMAP_DUMP[lab]=true;  PROFILE_SQLMAP_DUMP[staging]=true;  PROFILE_SQLMAP_DUMP[production]=false

# ── Metasploit ──────────────────────────────────────────────────
PROFILE_MSF_PAYLOAD[lab]="generic/shell_reverse_tcp"
PROFILE_MSF_PAYLOAD[staging]="generic/shell_reverse_tcp"
PROFILE_MSF_PAYLOAD[production]="NONE"

# ── Brute Force (Hydra) ─────────────────────────────────────────
PROFILE_BRUTE_FORCE[lab]=true;    PROFILE_BRUTE_FORCE[staging]=true;    PROFILE_BRUTE_FORCE[production]=false

# ── Nikto ───────────────────────────────────────────────────────
PROFILE_NIKTO_ENABLED[lab]=true;  PROFILE_NIKTO_ENABLED[staging]=true;  PROFILE_NIKTO_ENABLED[production]=false

# ── XSS (dalfox) ────────────────────────────────────────────────
PROFILE_XSS_WORKERS[lab]=5;    PROFILE_XSS_WORKERS[staging]=3;    PROFILE_XSS_WORKERS[production]=1

# ── Recon (subfinder + httpx) ───────────────────────────────────
PROFILE_RECON_THREADS[lab]=100; PROFILE_RECON_THREADS[staging]=50;  PROFILE_RECON_THREADS[production]=20

# ── Crawl (katana + ffuf) ───────────────────────────────────────
PROFILE_CRAWL_DEPTH[lab]=5;    PROFILE_CRAWL_DEPTH[staging]=3;    PROFILE_CRAWL_DEPTH[production]=2

# ── Limites ─────────────────────────────────────────────────────
PROFILE_MAX_EXPLOITS[lab]=999; PROFILE_MAX_EXPLOITS[staging]=50;  PROFILE_MAX_EXPLOITS[production]=10

# ── Timeouts (segundos) ─────────────────────────────────────────
PROFILE_TIMEOUT_SQLMAP_CRAWL[lab]=1800; PROFILE_TIMEOUT_SQLMAP_CRAWL[staging]=900;  PROFILE_TIMEOUT_SQLMAP_CRAWL[production]=300
PROFILE_TIMEOUT_SQLMAP_URL[lab]=600;    PROFILE_TIMEOUT_SQLMAP_URL[staging]=300;    PROFILE_TIMEOUT_SQLMAP_URL[production]=120
PROFILE_TIMEOUT_MSF[lab]=3600;          PROFILE_TIMEOUT_MSF[staging]=1800;          PROFILE_TIMEOUT_MSF[production]=600
PROFILE_TIMEOUT_HYDRA[lab]=600;         PROFILE_TIMEOUT_HYDRA[staging]=300;         PROFILE_TIMEOUT_HYDRA[production]=120
PROFILE_TIMEOUT_NIKTO[lab]=1200;        PROFILE_TIMEOUT_NIKTO[staging]=700;         PROFILE_TIMEOUT_NIKTO[production]=300
PROFILE_TIMEOUT_XSS[lab]=600;           PROFILE_TIMEOUT_XSS[staging]=300;           PROFILE_TIMEOUT_XSS[production]=120
PROFILE_TIMEOUT_CRAWL[lab]=900;         PROFILE_TIMEOUT_CRAWL[staging]=600;         PROFILE_TIMEOUT_CRAWL[production]=300
PROFILE_TIMEOUT_NMAP[lab]=900;          PROFILE_TIMEOUT_NMAP[staging]=600;          PROFILE_TIMEOUT_NMAP[production]=300

# ── Lógica de negócio / Authz (bizlogic) ────────────────────────
# Mutação real só em lab/staging; production sempre dry-run (verdito sem alterar estado).
PROFILE_BIZLOGIC_MUTATE[lab]=true;   PROFILE_BIZLOGIC_MUTATE[staging]=true;   PROFILE_BIZLOGIC_MUTATE[production]=false
PROFILE_BIZLOGIC_TIMEOUT[lab]=900;   PROFILE_BIZLOGIC_TIMEOUT[staging]=600;   PROFILE_BIZLOGIC_TIMEOUT[production]=300
